syntax = "proto3";

// Package pharos.node.v1 is the node node control contract. coxswain is the gRPC
// client; the node node is the server. coxswain dials out over mTLS — the node
// opens no connection to coxswain (DESIGN §2, §6, §7).
package pharos.node.v1;

import "google/protobuf/timestamp.proto";

// NodeControl is the control-plane service every node node exposes to coxswain.
//
// RPCs are unified across data-plane protocols: each request carries a
// Protocol field rather than the service offering per-protocol RPCs. Adding a
// protocol is a new Protocol enum value, not a schema break (DESIGN §11,
// decision 14 follow-up).
service NodeControl {
  // GetStatus reports node and per-protocol service health.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetMetrics reports counters for metrics sampling.
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);

  // PushConfig replaces the data-plane config for one protocol and reloads it.
  rpc PushConfig(PushConfigRequest) returns (PushConfigResponse);

  // AddPeer adds a single peer live, without restarting the data plane.
  rpc AddPeer(AddPeerRequest) returns (PeerResponse);

  // RemovePeer revokes a single peer live.
  rpc RemovePeer(RemovePeerRequest) returns (PeerResponse);

  // ListPeers returns configured peers and their runtime state (handshakes,
  // byte counters).
  rpc ListPeers(ListPeersRequest) returns (ListPeersResponse);

  // RestartService is a last-resort restart of one protocol's service.
  rpc RestartService(RestartServiceRequest) returns (RestartServiceResponse);

  // SetNetworkConfig applies the node's forwarding / masquerade / isolation
  // policy (DESIGN §3, decision 16), including per-device transit routes for
  // node cascade (decision 18).
  rpc SetNetworkConfig(SetNetworkConfigRequest) returns (SetNetworkConfigResponse);

  // ConfigureInnerLink creates or updates a node→node inner AmneziaWG link on
  // this (entry) node, toward an exit node (DESIGN §3, node cascade). The
  // interface reuses this node's keypair but carries the exit's listen port and
  // obfuscation so the handshake matches; the exit node needs no new RPC — it
  // sees the entry as an ordinary forwarded peer on its client interface.
  rpc ConfigureInnerLink(ConfigureInnerLinkRequest) returns (ConfigureInnerLinkResponse);

  // RemoveInnerLink tears a previously configured inner link down.
  rpc RemoveInnerLink(RemoveInnerLinkRequest) returns (RemoveInnerLinkResponse);

  // WatchEvents is a server-stream of live node events. coxswain holds it open;
  // this is what makes the admin UI live (DESIGN §7, coxswain milestone M4).
  rpc WatchEvents(WatchEventsRequest) returns (stream Event);
}

// Protocol identifies a data-plane protocol. Unknown values are ignored, never
// rejected (DESIGN §11).
enum Protocol {
  PROTOCOL_UNSPECIFIED = 0;
  PROTOCOL_AMNEZIAWG = 1;
  PROTOCOL_XRAY_REALITY = 2;
}

// Peer is one end-user tunnel credential as coxswain defines it.
message Peer {
  // id is coxswain's peer identifier, echoed back for correlation.
  string id = 1;
  Protocol protocol = 2;
  // public_key is the AmneziaWG public key, or the XRay client UUID.
  string public_key = 3;
  repeated string allowed_ips = 4;
  // preshared_key is optional (AmneziaWG).
  string preshared_key = 5;
  // endpoints are the peer's addresses. Always an array — multiple entries
  // support endpoint diversity and rotation (DESIGN §3, decision 17); a
  // single address is still a one-element array.
  repeated string endpoints = 6;
  // flow is the XRay VLESS flow for an XRAY_REALITY peer (e.g.
  // "xtls-rprx-vision"); empty for AmneziaWG.
  string flow = 7;
}

// PeerState is a Peer plus its runtime state on the node.
message PeerState {
  Peer peer = 1;
  google.protobuf.Timestamp last_handshake = 2;
  uint64 rx_bytes = 3;
  uint64 tx_bytes = 4;
}

message GetStatusRequest {}

message GetStatusResponse {
  string agent_version = 1;
  int64 uptime_seconds = 2;
  repeated ServiceStatus services = 3;
  // amneziawg is the node's AmneziaWG server identity, populated once node
  // has configured awg0. caravel needs these exact values to build a tunnel
  // that handshakes (DESIGN §3). Absent until the data plane is up.
  AmneziaWGInfo amneziawg = 4;
  // xray is the node's XRay/REALITY server identity (its REALITY public key),
  // populated once node has started the XRay service. caravel needs the public
  // key to build a REALITY client. Absent until the XRay data plane is up.
  XRayRealityInfo xray = 5;
}

// ServiceStatus is the health of one protocol's data-plane service.
message ServiceStatus {
  Protocol protocol = 1;
  bool running = 2;
  // listening reports whether the service is bound to its public port (443).
  bool listening = 3;
  uint32 peer_count = 4;
  string detail = 5;
}

// AmneziaWGInfo is a node's AmneziaWG server identity, as node configured it.
message AmneziaWGInfo {
  // public_key is the node's AmneziaWG server public key.
  string public_key = 1;
  // obfuscation is the node's obfuscation parameter set.
  AmneziaWGObfuscation obfuscation = 2;
}

// XRayRealityInfo is a node's XRay/REALITY server identity, as node configured
// it. The node owns the REALITY keypair (like its AmneziaWG obfuscation) and
// reports the public key here so caravel can build a matching REALITY client.
message XRayRealityInfo {
  // public_key is the node's REALITY x25519 public key (base64url).
  string public_key = 1;
}

// AmneziaWGObfuscation is one node's AmneziaWG obfuscation parameters. Each
// node randomises its own set for traffic diversity, so caravel must receive
// the exact values to build a tunnel that handshakes (DESIGN §3). The field
// names match the AmneziaWG config keys verbatim.
//
// node generates and enforces these structural rules; any client that
// generates or validates a set must apply the same guards:
//   - jmin <= jmax
//   - h1-h4 are four distinct values, each >= 5 (1-4 are reserved for
//     AmneziaWG's standard packet types)
//   - s2 != s1 + 56 — otherwise a padded init packet is length-
//     indistinguishable from a padded response packet and awg rejects it
message AmneziaWGObfuscation {
  uint32 jc = 1; // junk packet count
  uint32 jmin = 2; // junk packet minimum size
  uint32 jmax = 3; // junk packet maximum size
  uint32 s1 = 4; // init-packet junk size
  uint32 s2 = 5; // response-packet junk size
  uint32 s3 = 6; // cookie-reply-packet junk size
  uint32 s4 = 7; // transport-packet junk size
  uint32 h1 = 8; // init-packet magic header
  uint32 h2 = 9; // response-packet magic header
  uint32 h3 = 10; // underload-packet magic header
  uint32 h4 = 11; // transport-packet magic header
  string i1 = 12; // special-junk packet templates I1-I5
  string i2 = 13;
  string i3 = 14;
  string i4 = 15;
  string i5 = 16;
}

message GetMetricsRequest {}

message GetMetricsResponse {
  repeated PeerState peers = 1;
  uint64 total_rx_bytes = 2;
  uint64 total_tx_bytes = 3;
  uint64 handshakes_total = 4;
  uint64 errors_total = 5;
}

message PushConfigRequest {
  Protocol protocol = 1;
  // revision is coxswain's monotonically increasing config revision.
  int64 revision = 2;
  // config is the protocol-specific config document. The encoding is fixed
  // per protocol so node can decode it without out-of-band knowledge:
  //
  //   - PROTOCOL_AMNEZIAWG: proto.Marshal of AmneziaWGConfig.
  //   - PROTOCOL_XRAY_REALITY: proto.Marshal of XRayRealityConfig.
  //
  // Unknown protocols return Unimplemented.
  bytes config = 3;
}

message PushConfigResponse {
  int64 applied_revision = 1;
  bool reloaded = 2;
}

// AmneziaWGConfig is the PushConfigRequest.config payload for
// PROTOCOL_AMNEZIAWG: the full peer set coxswain wants the node to apply. The
// node-level obfuscation parameters are intentionally absent — node owns
// them (AmneziaWGObfuscation, decision-14 follow-up); coxswain sends peers,
// nothing else.
message AmneziaWGConfig {
  repeated Peer peers = 1;
}

// XRayRealityConfig is the PushConfigRequest.config payload for
// PROTOCOL_XRAY_REALITY: the VLESS client set plus the REALITY server policy
// coxswain wants applied. The node owns the REALITY keypair (reported via
// XRayRealityInfo), so it is absent here — coxswain sends the clients and the
// camouflage policy, nothing secret.
message XRayRealityConfig {
  // peers are the VLESS clients (Peer.public_key = client UUID, Peer.flow =
  // e.g. "xtls-rprx-vision").
  repeated Peer peers = 1;
  // dest is the REALITY decoy/target to borrow a TLS handshake from, host:port
  // (e.g. "www.microsoft.com:443").
  string dest = 2;
  // server_names are the SNI values the node accepts (must include the decoy
  // host, e.g. ["www.microsoft.com"]).
  repeated string server_names = 3;
  // short_ids are the allowed REALITY shortIds (an entry of "" allows clients
  // that send no shortId).
  repeated string short_ids = 4;
  // port is the TCP port the XRay inbound listens on (e.g. 443).
  uint32 port = 5;
}

// NetworkConfig is a node's traffic-handling policy (DESIGN §3, decision 16).
// masquerade and isolation are only meaningful when forwarding is enabled.
message NetworkConfig {
  // forwarding routes client traffic onward (kernel IP forwarding).
  bool forwarding = 1;
  // masquerade source-NATs forwarded traffic to the node's address.
  bool masquerade = 2;
  // isolation drops client-to-client forwarded traffic.
  bool isolation = 3;
  // transits route specific devices into an inner link instead of the public
  // egress — the entry-node side of node cascade (DESIGN §3, decision 18). A
  // device named here is policy-routed into its inner_interface and is NOT
  // masqueraded to the internet; the exit node does that.
  repeated TransitRoute transits = 4;
}

// TransitRoute policy-routes one cascaded device's tunnel traffic into an inner
// AmneziaWG interface toward its chosen exit, instead of masquerading it
// locally (DESIGN §3, the entry-node `transit` rule). coxswain computes the
// mark and table; node installs the mangle MARK + ip rule + ip route.
message TransitRoute {
  // device_cidr is the client's tunnel address, e.g. "10.8.0.5/32".
  string device_cidr = 1;
  // inner_interface is the inner link this device egresses through, e.g. "awg1".
  string inner_interface = 2;
  // mark is the fwmark applied to this device's packets.
  uint32 mark = 3;
  // table is the policy routing table id the mark looks up.
  uint32 table = 4;
}

message SetNetworkConfigRequest {
  NetworkConfig config = 1;
}

message SetNetworkConfigResponse {
  bool applied = 1;
}

// InnerLinkConfig describes one node→node inner AmneziaWG link on the entry
// node (DESIGN §3, node cascade). node supplies this node's private key from
// its own identity; coxswain supplies everything that must match the exit.
message InnerLinkConfig {
  // interface is the inner wg interface name, e.g. "awg1". It is distinct from
  // the client interface (awg0) and from any other inner link.
  string interface = 1;
  // listen_port is the inner interface's local UDP port. It must not collide
  // with the client interface (443) or another inner link.
  uint32 listen_port = 2;
  // mtu is the computed path MTU for the link; it must keep the nested tunnel
  // at or above the IPv6 floor of 1280 (DESIGN §3 hop limit). 0 = node default.
  uint32 mtu = 3;
  // peer_obfuscation is the EXIT node's obfuscation set. The entry's inner
  // interface adopts it so its handshake to the exit's interface matches.
  AmneziaWGObfuscation peer_obfuscation = 4;
  // exit is the exit node as a peer: its AmneziaWG public key, public endpoint
  // (this node dials it), AllowedIPs (0.0.0.0/0 — all cascaded traffic), and an
  // optional preshared key for the link.
  Peer exit = 5;
}

message ConfigureInnerLinkRequest {
  InnerLinkConfig config = 1;
  // revision is coxswain's monotonically increasing revision for this inner
  // link, with the same semantics as PushConfigRequest.revision.
  int64 revision = 2;
}

message ConfigureInnerLinkResponse {
  int64 applied_revision = 1;
  bool reloaded = 2;
}

message RemoveInnerLinkRequest {
  // interface is the inner link to tear down, e.g. "awg1".
  string interface = 1;
}

message RemoveInnerLinkResponse {
  bool removed = 1;
}

message AddPeerRequest {
  Peer peer = 1;
}

message RemovePeerRequest {
  Protocol protocol = 1;
  string public_key = 2;
}

// PeerResponse is the result of an AddPeer or RemovePeer call.
message PeerResponse {
  string peer_id = 1;
  bool applied = 2;
}

message ListPeersRequest {
  // protocol filters the result; PROTOCOL_UNSPECIFIED returns every peer.
  Protocol protocol = 1;
}

message ListPeersResponse {
  repeated PeerState peers = 1;
}

message RestartServiceRequest {
  Protocol protocol = 1;
}

message RestartServiceResponse {
  bool restarted = 1;
}

message WatchEventsRequest {}

// EventType classifies a live node event.
enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_HANDSHAKE_UP = 1;
  EVENT_TYPE_HANDSHAKE_DOWN = 2;
  EVENT_TYPE_PEER_CONNECTED = 3;
  EVENT_TYPE_PEER_DISCONNECTED = 4;
  EVENT_TYPE_ERROR = 5;
}

// Event is one live event streamed from a node to coxswain.
message Event {
  google.protobuf.Timestamp at = 1;
  EventType type = 2;
  Protocol protocol = 3;
  // peer_id is set for peer-scoped events.
  string peer_id = 4;
  string message = 5;
}
